apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail-frontend
  template:
    metadata:
      labels:
        app: retail-frontend
    spec:
      containers:
        - name: retail-frontend
          image: balarithwik/retail-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_BASE
              value: http://retail-backend:5000
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"